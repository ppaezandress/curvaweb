name: CI (app · Tiempos)

# Red de seguridad de CURVA Tiempos. Hasta ahora cada cambio se validaba a mano
# (tsc + build + QA visual) y las regresiones de cálculo solo aparecían en producción,
# reportadas por el equipo días después. Esto corre en cada push a la app.
on:
  push:
    branches: [main]
    paths: ["app/**", ".github/workflows/ci.yml"]
  pull_request:
    paths: ["app/**", ".github/workflows/ci.yml"]

# Un push nuevo cancela la corrida anterior de la misma rama (no gastamos minutos de más).
concurrency:
  group: ci-app-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      # --legacy-peer-deps no hace falta aquí; si algún día lo pide, va en este paso.
      - name: Instalar dependencias
        run: npm ci

      - name: Tipos
        run: npm run typecheck

      - name: Pruebas unitarias
        run: npm test

      # Lint NO bloquea todavía: el repo arrastra advertencias previas (refs-during-render y
      # set-state-in-effect en mensajes/page.tsx) que no son de ningún cambio nuevo. Queda
      # visible para irlas bajando; cuando lleguen a cero, se le quita el continue-on-error.
      - name: Lint (informativo)
        run: npm run lint
        continue-on-error: true

      # El build usa credenciales de mentira a propósito: aquí solo comprobamos que compila,
      # nunca tocamos el Notion ni el Supabase reales. Las envs de verdad viven en Vercel.
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder
          NEXT_TELEMETRY_DISABLED: "1"
