<!doctype html>
<meta charset="utf-8">
<title>Sonda: ¿qué sobrevive con la pestaña oculta?</title>
<body style="font:14px system-ui;padding:20px">
<h1>Sonda de segundo plano</h1>
<pre id="out">arrancando…</pre>
<video id="v" muted playsinline style="width:160px"></video>

<script type="module">
// Mide, por separado, qué eslabón de la cadena sigue vivo cuando la pestaña se oculta:
//   1. worker      → ticks de un setInterval dentro de un Web Worker
//   2. rafTicks    → requestAnimationFrame (se espera que muera: sirve de control)
//   3. frames      → cuadros entregados por MediaStreamTrackProcessor (cámara directa)
//   4. gpuInfer    → inferencias completadas de MediaPipe con delegate GPU
//   5. cpuInfer    → inferencias completadas de MediaPipe con delegate CPU
// Cada contador guarda además cuánto valía al ocultarse la pestaña, para poder comparar.
const S = window.stats = {
  worker: 0, rafTicks: 0, frames: 0, gpuInfer: 0, cpuInfer: 0,
  gpuError: null, cpuError: null, hiddenAt: null, atHide: null, ready: false,
};

const out = document.getElementById("out");
setInterval(() => { out.textContent = JSON.stringify(S, null, 2); }, 500);

document.addEventListener("visibilitychange", () => {
  if (document.hidden) {
    S.hiddenAt = Date.now();
    S.atHide = { worker: S.worker, rafTicks: S.rafTicks, frames: S.frames, gpuInfer: S.gpuInfer, cpuInfer: S.cpuInfer };
  }
});

// 1) Worker
const wsrc = `let n=0; setInterval(()=>postMessage(++n), 100);`;
const w = new Worker(URL.createObjectURL(new Blob([wsrc], { type: "text/javascript" })));
w.onmessage = () => { S.worker++; };

// 2) rAF (control: debería congelarse)
(function raf() { S.rafTicks++; requestAnimationFrame(raf); })();

// 3) Cámara + processor
const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 320, height: 240 } });
const video = document.getElementById("v");
video.srcObject = stream;
await video.play();

const track = stream.getVideoTracks()[0];
let latest = null;
if (window.MediaStreamTrackProcessor) {
  const reader = new MediaStreamTrackProcessor({ track }).readable.getReader();
  (async () => {
    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      S.frames++;
      latest?.close();
      latest = value;
    }
  })();
}

// 4 y 5) MediaPipe con los dos delegates, para ver cuál aguanta oculto
const vision = await import("/mediapipe/vision_bundle.mjs");
const fileset = await vision.FilesetResolver.forVisionTasks("/mediapipe/wasm");

async function make(delegate) {
  return vision.HandLandmarker.createFromOptions(fileset, {
    baseOptions: { modelAssetPath: "/mediapipe/hand_landmarker.task", delegate },
    runningMode: "VIDEO",
    numHands: 1,
  });
}

let gpu = null, cpu = null;
try { gpu = await make("GPU"); } catch (e) { S.gpuError = String(e).slice(0, 120); }
try { cpu = await make("CPU"); } catch (e) { S.cpuError = String(e).slice(0, 120); }
S.ready = true;

// El pulso lo da el worker: es lo único que sabemos que sobrevive.
let t = 0;
w.addEventListener("message", () => {
  const src = latest ?? video;
  const now = ++t * 100 + performance.now() % 1;
  if (gpu) {
    try { gpu.detectForVideo(src, now); S.gpuInfer++; }
    catch (e) { S.gpuError = String(e).slice(0, 120); }
  }
  if (cpu) {
    try { cpu.detectForVideo(src, now + 0.5); S.cpuInfer++; }
    catch (e) { S.cpuError = String(e).slice(0, 120); }
  }
});
</script>
