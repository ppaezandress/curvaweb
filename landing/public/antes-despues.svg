<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="red-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fef2f2"/>
      <stop offset="100%" stop-color="#fee2e2"/>
    </linearGradient>
    <linearGradient id="green-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#dcfce7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" rx="16" fill="#f8fafc"/>

  <!-- ANTES -->
  <rect x="20" y="20" width="370" height="410" rx="14" fill="url(#red-grad)" stroke="#fecaca" stroke-width="1"/>
  <rect x="20" y="20" width="370" height="5" rx="3" fill="#ef4444"/>
  <text x="205" y="52" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#ef4444" letter-spacing="2">ANTES</text>

  <!-- Persona central agobiada -->
  <circle cx="205" cy="120" r="32" fill="#fca5a5" stroke="#ef4444" stroke-width="1.5"/>
  <text x="205" y="116" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#991b1b">FUNDADOR</text>
  <text x="205" y="130" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#b91c1c">carga todo</text>

  <!-- Flechas caóticas hacia el fundador -->
  <line x1="80" y1="85" x2="175" y2="108" stroke="#f87171" stroke-width="1.5" stroke-dasharray="3 2"/>
  <line x1="330" y1="85" x2="235" y2="108" stroke="#f87171" stroke-width="1.5" stroke-dasharray="3 2"/>
  <line x1="100" y1="160" x2="175" y2="130" stroke="#f87171" stroke-width="1.5" stroke-dasharray="3 2"/>
  <line x1="310" y1="160" x2="235" y2="130" stroke="#f87171" stroke-width="1.5" stroke-dasharray="3 2"/>
  <line x1="205" y1="75" x2="205" y2="88" stroke="#f87171" stroke-width="1.5" stroke-dasharray="3 2"/>

  <!-- Problemas flotando -->
  <rect x="40" y="68" width="80" height="28" rx="6" fill="white" filter="url(#shadow)"/>
  <text x="80" y="80" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="600" fill="#dc2626">Ventas</text>
  <text x="80" y="90" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#9ca3af">sin proceso</text>

  <rect x="290" y="68" width="80" height="28" rx="6" fill="white" filter="url(#shadow)"/>
  <text x="330" y="80" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="600" fill="#dc2626">Finanzas</text>
  <text x="330" y="90" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#9ca3af">en Excel</text>

  <rect x="55" y="148" width="80" height="28" rx="6" fill="white" filter="url(#shadow)"/>
  <text x="95" y="160" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="600" fill="#dc2626">Operacion</text>
  <text x="95" y="170" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#9ca3af">apaga fuegos</text>

  <rect x="275" y="148" width="80" height="28" rx="6" fill="white" filter="url(#shadow)"/>
  <text x="315" y="160" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="600" fill="#dc2626">Equipo</text>
  <text x="315" y="170" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#9ca3af">sin roles claros</text>

  <rect x="155" y="58" width="100" height="22" rx="6" fill="white" filter="url(#shadow)"/>
  <text x="205" y="73" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="600" fill="#dc2626">Clientes</text>

  <!-- Lista de problemas -->
  <rect x="45" y="195" width="320" height="220" rx="10" fill="white" stroke="#fecaca" stroke-width="1"/>

  <circle cx="70" cy="222" r="3" fill="#ef4444"/>
  <text x="82" y="225" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#374151">El negocio no funciona sin el dueno</text>

  <circle cx="70" cy="250" r="3" fill="#ef4444"/>
  <text x="82" y="253" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#374151">Procesos en la cabeza de alguien</text>

  <circle cx="70" cy="278" r="3" fill="#ef4444"/>
  <text x="82" y="281" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#374151">No hay organigrama ni roles</text>

  <circle cx="70" cy="306" r="3" fill="#ef4444"/>
  <text x="82" y="309" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#374151">Decisiones reactivas, sin datos</text>

  <circle cx="70" cy="334" r="3" fill="#ef4444"/>
  <text x="82" y="337" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#374151">Se vende mas pero el caos crece</text>

  <circle cx="70" cy="362" r="3" fill="#ef4444"/>
  <text x="82" y="365" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#374151">Sistemas comprados que nadie usa</text>

  <circle cx="70" cy="390" r="3" fill="#ef4444"/>
  <text x="82" y="393" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#374151">Crecimiento frenado por desorden</text>

  <!-- DESPUES -->
  <rect x="410" y="20" width="370" height="410" rx="14" fill="url(#green-grad)" stroke="#bbf7d0" stroke-width="1"/>
  <rect x="410" y="20" width="370" height="5" rx="3" fill="#22c55e"/>
  <text x="595" y="52" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#16a34a" letter-spacing="2">DESPUES</text>

  <!-- Estructura organizada -->
  <!-- CEO -->
  <rect x="555" y="68" width="80" height="30" rx="8" fill="#2563eb" filter="url(#shadow)"/>
  <text x="595" y="87" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="white">Director Gral.</text>

  <!-- Lines -->
  <line x1="595" y1="98" x2="595" y2="108" stroke="#86efac" stroke-width="1.5"/>
  <line x1="490" y1="108" x2="700" y2="108" stroke="#86efac" stroke-width="1.5"/>
  <line x1="490" y1="108" x2="490" y2="118" stroke="#86efac" stroke-width="1.5"/>
  <line x1="595" y1="108" x2="595" y2="118" stroke="#86efac" stroke-width="1.5"/>
  <line x1="700" y1="108" x2="700" y2="118" stroke="#86efac" stroke-width="1.5"/>

  <!-- 3 areas -->
  <rect x="450" y="118" width="80" height="30" rx="8" fill="white" filter="url(#shadow)" stroke="#86efac" stroke-width="1"/>
  <text x="490" y="137" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="600" fill="#0f172a">Operaciones</text>

  <rect x="555" y="118" width="80" height="30" rx="8" fill="white" filter="url(#shadow)" stroke="#86efac" stroke-width="1"/>
  <text x="595" y="137" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="600" fill="#0f172a">Comercial</text>

  <rect x="660" y="118" width="80" height="30" rx="8" fill="white" filter="url(#shadow)" stroke="#86efac" stroke-width="1"/>
  <text x="700" y="137" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="600" fill="#0f172a">Admin</text>

  <!-- Sub teams -->
  <line x1="490" y1="148" x2="490" y2="158" stroke="#d1d5db" stroke-width="1"/>
  <line x1="595" y1="148" x2="595" y2="158" stroke="#d1d5db" stroke-width="1"/>
  <line x1="700" y1="148" x2="700" y2="158" stroke="#d1d5db" stroke-width="1"/>

  <rect x="458" y="158" width="64" height="22" rx="5" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="490" y="173" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="7" font-weight="500" fill="#15803d">Equipos</text>

  <rect x="563" y="158" width="64" height="22" rx="5" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="595" y="173" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="7" font-weight="500" fill="#15803d">Ventas</text>

  <rect x="668" y="158" width="64" height="22" rx="5" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="700" y="173" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="7" font-weight="500" fill="#15803d">Finanzas</text>

  <!-- Lista de resultados -->
  <rect x="435" y="195" width="320" height="220" rx="10" fill="white" stroke="#bbf7d0" stroke-width="1"/>

  <circle cx="460" cy="222" r="3" fill="#22c55e"/>
  <text x="472" y="225" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#374151">El negocio funciona sin el dueno</text>

  <circle cx="460" cy="250" r="3" fill="#22c55e"/>
  <text x="472" y="253" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#374151">Procesos documentados y claros</text>

  <circle cx="460" cy="278" r="3" fill="#22c55e"/>
  <text x="472" y="281" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#374151">Organigrama, roles y responsables</text>

  <circle cx="460" cy="306" r="3" fill="#22c55e"/>
  <text x="472" y="309" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#374151">Decisiones basadas en datos y KPIs</text>

  <circle cx="460" cy="334" r="3" fill="#22c55e"/>
  <text x="472" y="337" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#374151">Crecimiento ordenado y sostenible</text>

  <circle cx="460" cy="362" r="3" fill="#22c55e"/>
  <text x="472" y="365" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#374151">Sistemas integrados y funcionando</text>

  <circle cx="460" cy="390" r="3" fill="#22c55e"/>
  <text x="472" y="393" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#374151">Cultura y gobernanza definida</text>

  <!-- Flecha central -->
  <rect x="388" y="200" width="26" height="26" rx="13" fill="#0f172a"/>
  <text x="401" y="218" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" fill="white">&#8594;</text>
</svg>