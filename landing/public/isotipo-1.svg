<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200">
  <!-- Isotipo 1: La S-Curve de Lewin pura -->
  <!-- Descongelar (hielo/frío) → Cambio (energía) → Recongelar (sólido/nuevo) -->
  <defs>
    <linearGradient id="lewin1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#94a3b8" stop-opacity="0.5"/>
      <stop offset="35%" stop-color="#6366f1"/>
      <stop offset="65%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#f0f9ff"/>
    </linearGradient>
    <filter id="gl1">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="500" height="200" fill="#09090b"/>

  <!-- Estado congelado (bloque izquierdo) -->
  <rect x="20" y="55" width="30" height="30" rx="3" fill="none" stroke="#475569" stroke-width="1.5" opacity="0.5"/>
  <line x1="25" y1="60" x2="45" y2="60" stroke="#475569" stroke-width="1" opacity="0.3"/>
  <line x1="25" y1="67" x2="40" y2="67" stroke="#475569" stroke-width="1" opacity="0.3"/>
  <line x1="25" y1="74" x2="43" y2="74" stroke="#475569" stroke-width="1" opacity="0.3"/>

  <!-- LA CURVA S — el corazón del isotipo -->
  <path d="M 50 70 C 65 70, 70 70, 80 85 C 90 100, 95 105, 105 105 C 115 105, 120 100, 125 85 C 130 70, 135 55, 145 50"
        stroke="url(#lewin1)" stroke-width="6" fill="none" stroke-linecap="round" filter="url(#gl1)"/>

  <!-- Tres marcadores de fase -->
  <circle cx="50" cy="70" r="4" fill="#475569"/>
  <circle cx="105" cy="105" r="5" fill="#2563eb" filter="url(#gl1)"/>
  <circle cx="145" cy="50" r="4" fill="#e0f2fe"/>

  <!-- Estado recongelado (bloque derecho, nuevo, luminoso) -->
  <rect x="155" y="35" width="30" height="30" rx="3" fill="none" stroke="#bfdbfe" stroke-width="1.5" opacity="0.7"/>
  <line x1="160" y1="42" x2="180" y2="42" stroke="#bfdbfe" stroke-width="1" opacity="0.4"/>
  <line x1="160" y1="49" x2="175" y2="49" stroke="#bfdbfe" stroke-width="1" opacity="0.4"/>
  <line x1="160" y1="56" x2="178" y2="56" stroke="#bfdbfe" stroke-width="1" opacity="0.4"/>

  <!-- Wordmark -->
  <text x="260" y="115" font-family="Inter, system-ui, sans-serif" font-size="58" font-weight="800" fill="white" letter-spacing="4">CURVA</text>
  <text x="262" y="140" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="400" fill="#475569" letter-spacing="6">CONSULTORÍA ESTRATÉGICA</text>
</svg>
