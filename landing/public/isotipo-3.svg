<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200">
  <!-- Isotipo 3: La C como sigmoid — minimalista, icónico -->
  <defs>
    <linearGradient id="lw3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="30%" stop-color="#6366f1"/>
      <stop offset="70%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="gl3">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="500" height="200" fill="#09090b"/>

  <!-- Sigmoid GRANDE y limpia — ES la C y ES la curva de cambio -->
  <path d="M 30 145 C 30 145, 50 145, 70 130 C 100 108, 80 68, 110 55 C 130 46, 150 46, 155 46"
        stroke="url(#lw3)" stroke-width="8" fill="none" stroke-linecap="round" filter="url(#gl3)"/>

  <!-- Labels minimalistas de las 3 fases -->
  <text x="30" y="168" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#475569" letter-spacing="1.5">DESCONGELAR</text>
  <text x="72" y="120" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#6366f1" letter-spacing="1.5" opacity="0.6">CAMBIAR</text>
  <text x="130" y="40" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#38bdf8" letter-spacing="1.5">RECONGELAR</text>

  <!-- Wordmark -->
  <text x="250" y="115" font-family="Inter, system-ui, sans-serif" font-size="58" font-weight="800" fill="white" letter-spacing="4">CURVA</text>
  <text x="252" y="140" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="400" fill="#475569" letter-spacing="6">CONSULTORÍA ESTRATÉGICA</text>
</svg>
