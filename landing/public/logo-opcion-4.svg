<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <!-- Opción 4: Monograma CV geométrico + wordmark -->
  <rect width="400" height="120" fill="#0f172a"/>
  <!-- Contenedor cuadrado redondeado -->
  <rect x="15" y="15" width="90" height="90" rx="18" fill="none" stroke="white" stroke-width="2.5"/>
  <!-- C -->
  <path d="M 72 38 A 22 22 0 1 0 72 82" fill="none" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <!-- V superpuesta -->
  <path d="M 48 42 L 62 82 L 76 42" fill="none" stroke="#2563eb" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Wordmark -->
  <text x="255" y="78" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="600" fill="white" text-anchor="middle" letter-spacing="6">CURVA</text>
</svg>
